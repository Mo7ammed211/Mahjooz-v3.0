  <script>
    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      
      // منع تكرار الضغط أثناء عمليات الحفظ والتحميل (Double Submission Prevention)
      const loader = document.getElementById('global-loader');
      if (loader && !loader.classList.contains('hidden')) {
        e.preventDefault();
        return;
      }
      
      const activeEl = document.activeElement;
      if (activeEl) {
        // 1. الدخول الموحد (Unified Login Page)
        if (document.getElementById('unified-login-page') && 
            (activeEl.id === 'u-login-id' || activeEl.id === 'u-login-pass')) {
          e.preventDefault();
          if (typeof unifiedLogin === 'function') unifiedLogin();
          return;
        }
        
        // 2. النوافذ المنبثقة العامة (Modals & Dialogs)
        const modalBody = document.getElementById('modal-body');
        if (modalBody && modalBody.contains(activeEl)) {
          const primaryBtn = modalBody.querySelector('.btn-primary');
          if (primaryBtn) {
            e.preventDefault();
            primaryBtn.click();
            return;
          }
        }

        // 3. النماذج العامة والصفحات ذات زر الحفظ الرئيسي
        if (activeEl.tagName === 'INPUT' || activeEl.tagName === 'SELECT' || activeEl.tagName === 'TEXTAREA') {
          const container = activeEl.closest('.form-group, .signup-form-scroll, .form-grid-2, .signup-step-container');
          if (container) {
            const primaryBtn = container.querySelector('.btn-primary') || container.querySelector('.login-submit-btn');
            if (primaryBtn) {
              e.preventDefault();
              primaryBtn.click();
              return;
            }
          }
        }
      }

      // الرجوع للطرق القديمة احتياطياً
      const loginPage = document.getElementById('login-page');
      if (loginPage) {
        const activeTab = document.querySelector('.login-tab.active');
        try {
          if (activeTab?.id === 'tab-admin' && typeof loginAdmin === 'function') loginAdmin();
          else if (typeof loginUser === 'function') loginUser();
        } catch (err) { console.warn('Enter handler:', err); }
      }
    });

    // Hide Splash Screen on load is now handled by core.js (hideLoader)

    // ── Back to Top Button ──
    (function() {
      const btn = document.getElementById('back-to-top');
      if (!btn) return;
      let ticking = false;
      window.addEventListener('scroll', function() {
        if (!ticking) {
          requestAnimationFrame(function() {
            if (window.scrollY > 320) {
              btn.classList.add('visible');
            } else {
              btn.classList.remove('visible');
            }
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });
    })();
  </script>
